<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script type="text/javascript">
    (function (location) {
      if (location.search && location.search.startsWith('?/')) {
        var decoded = location.search.slice(1).split('&').map(function (segment) {
          return segment.replace(/~and~/g, '&');
        }).join('?');

        window.history.replaceState(
          null,
          null,
          location.pathname.replace(/\/$/, '') + decoded + location.hash
        );
      }
    }(window.location));
  </script>

  <link rel="shortcut icon" href="%BASE_URL%logo.svg?v=2" />
  <link rel="apple-touch-icon" href="%BASE_URL%logo.svg?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="VIT Shuttle Management System - Track campus shuttles in real-time, view ETA, and select bus stops" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>VIT Shuttle Tracker</title>
</head>
